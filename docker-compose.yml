services:
  postgres:
    # pgvector build of Postgres 16 - required by V15 (semantic search embeddings).
    image: pgvector/pgvector:pg16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Dev mail server for account-verification emails. SMTP on 1025 (matches
  # spring.mail defaults); web inbox to read sent mail at http://localhost:8025.
  # Nothing is delivered to the outside world - perfect for local/QA.
  mailpit:
    image: axllent/mailpit:latest
    container_name: ecommerce-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI / REST API
    restart: unless-stopped

volumes:
  postgres_data:
