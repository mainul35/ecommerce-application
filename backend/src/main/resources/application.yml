spring:
  application:
    name: ecommerce-platform

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Account verification email. Dev default targets Mailpit (docker-compose):
  # SMTP on 1025, web inbox on http://localhost:8025. No auth in dev.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.r2dbc: DEBUG

jwt:
  # DEV-ONLY placeholder secret. MUST be overridden via JWT_SECRET in every shared
  # environment - see docs/POST_DEPLOYMENT_SECRETS.md. Anyone with this value can
  # forge tokens for any user, including ADMIN.
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters}
  # Short-lived ACCESS token (default 1h). The frontend silently exchanges the
  # refresh token for a new access token on 401, so a leaked access token is only
  # useful for a short window. Lower further (e.g. 900000 = 15m) for stricter posture.
  expiration: ${JWT_EXPIRATION:3600000}          # 1 hour
  # Longer-lived REFRESH token (default 7 days). Accepted only at the refresh
  # endpoints; never authenticates a normal request.
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}   # 7 days

cors:
  # General API origins (storefront + admin apps). Public endpoints must be
  # reachable from both, so both ports are listed.
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
  # Admin API origins - ONLY the standalone admin dashboard (5174). The admin
  # surface (/api/admin/**) rejects any other origin at the browser (CORS) layer,
  # so storefront-origin JS cannot call admin APIs even before the token check.
  admin-origins: ${CORS_ADMIN_ORIGINS:http://localhost:5174}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Fallback admin seeded on first boot. DEV defaults are guessable (admin/secret)
# and exist only so a fresh machine has a login. In production either set a strong
# ADMIN_BOOTSTRAP_PASSWORD or disable this entirely (enabled=false) and rely on a
# vault-provisioned admin. See docs/POST_DEPLOYMENT_SECRETS.md.
admin:
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    email: ${ADMIN_BOOTSTRAP_EMAIL:admin}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:secret}
    first-name: ${ADMIN_BOOTSTRAP_FIRST_NAME:System}
    last-name: ${ADMIN_BOOTSTRAP_LAST_NAME:Administrator}

# Stock reservation: how long a PENDING order holds stock before auto-cancel.
reservation:
  ttl-hours: ${RESERVATION_TTL_HOURS:168}            # 7 days
  cleanup-interval-ms: ${RESERVATION_CLEANUP_MS:300000}  # 5 minutes
  cleanup-initial-delay-ms: 60000

# Marketplace escrow: buyer-protection window after delivery, during which the
# buyer can confirm receipt, open a dispute, or request item returns. When the
# window lapses silently, held funds auto-release to the seller's wallet.
escrow:
  protection-days: ${ESCROW_PROTECTION_DAYS:7}
  release-interval-ms: ${ESCROW_RELEASE_INTERVAL_MS:300000}   # 5 minutes
  release-initial-delay-ms: 90000

# Object storage for product media (PUBLIC) and dispute evidence (PRIVATE).
# provider=local (default) uses the filesystem; provider=s3 uses MinIO/AWS S3
# (required once the backend runs >1 replica - local disk isn't shared).
# See docs/DEPLOYMENT_PLAYBOOK.md §8. KYC evidence still uses its own local
# store (kyc.storage-dir) pending a download-to-temp layer for the OCR/vision engines.
storage:
  provider: ${STORAGE_PROVIDER:local}
  local:
    # PUBLIC media reuses app.upload-dir (served by /uploads/**); this is the
    # PRIVATE root for streamed evidence (dispute attachments).
    private-dir: ${STORAGE_PRIVATE_DIR:private-storage}
  s3:
    endpoint: ${S3_ENDPOINT:}            # e.g. http://minio:9000 (blank = real AWS S3)
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:ecommerce-media}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style-access: ${S3_PATH_STYLE:true}
    public-base-url: ${S3_PUBLIC_BASE_URL:}   # public serving base for product media

# Mandatory account verification. Email is real (sent via spring.mail above).
# Phone is a DUMMY OTP for now - real bulk SMS needs a paid subscription, so
# the OTP is logged and a fixed code is always accepted. Set phone-dummy=false
# and wire a real SMS provider to go live.
verification:
  from-email: ${VERIFICATION_FROM_EMAIL:no-reply@ecommerce.local}
  email-ttl-hours: ${VERIFICATION_EMAIL_TTL_HOURS:24}
  phone-otp-ttl-minutes: ${VERIFICATION_PHONE_TTL_MINUTES:10}
  phone-dummy: ${VERIFICATION_PHONE_DUMMY:true}
  dummy-phone-otp: ${VERIFICATION_DUMMY_OTP:000000}

# Seller e-KYC: photo-ID + selfies + utility-bill verification.
# Evidence is TRANSIENT: purged on decision or after retention-hours (72h cap).
# OCR needs Tesseract traineddata on disk (https://github.com/tesseract-ocr/tessdata_fast):
#   download eng.traineddata (+ ben.traineddata for Bangla NIDs) into KYC_TESSDATA_PATH.
# Face comparison uses the local Ollama vision model: ollama pull llava
# When either engine is missing, cases route to the admin review queue instead of failing.
kyc:
  storage-dir: ${KYC_STORAGE_DIR:kyc-private}   # PRIVATE - never served via /uploads
  retention-hours: ${KYC_RETENTION_HOURS:72}
  purge-interval-ms: ${KYC_PURGE_INTERVAL_MS:600000}   # 10 minutes
  ocr:
    tessdata-path: ${KYC_TESSDATA_PATH:}
    languages: ${KYC_OCR_LANGUAGES:eng}
  vision:
    model: ${KYC_VISION_MODEL:llava}
    timeout-seconds: ${KYC_VISION_TIMEOUT_SECONDS:120}
  thresholds:
    name-match: ${KYC_NAME_MATCH_THRESHOLD:0.80}
    address-match: ${KYC_ADDRESS_MATCH_THRESHOLD:0.70}

# Stripe payment integration. Replace placeholders with sk_test_... and whsec_... keys.
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_PLACEHOLDER_REPLACE_VIA_ENV}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_PLACEHOLDER_REPLACE_VIA_ENV}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:5174/checkout/success?orderId={CHECKOUT_SESSION_ID}}
  cancel-url:  ${STRIPE_CANCEL_URL:http://localhost:5174/checkout/cancel?orderId={CHECKOUT_SESSION_ID}}

app:
  # Directory where uploaded product media files are stored.
  # Resolved relative to the working directory when the app starts (backend/).
  # Override with UPLOAD_DIR env var in production to use an absolute path.
  upload-dir: ${UPLOAD_DIR:uploads}
  # Frontend base URL — used by payment gateways for success/cancel redirects.
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  # Backend base URL — used by payment gateways for server-side callback URLs.
  # In development, expose via ngrok or similar so remote gateways can reach it.
  backend-url: ${BACKEND_URL:http://localhost:8080}

ollama:
  # Base URL of the Ollama server. Local dev: http://localhost:11434.
  # Hosted (Ollama Cloud) for KYC vision without a local GPU: set OLLAMA_URL to the
  # cloud endpoint and OLLAMA_API_KEY to your key (see docs/DEPLOYMENT_PLAYBOOK.md §14).
  url: ${OLLAMA_URL:http://localhost:11434}
  # Bearer token for hosted inference. Blank for a local server (no auth needed).
  api-key: ${OLLAMA_API_KEY:}
  # Embedding model pulled in Ollama. Run: ollama pull nomic-embed-text
  # For better multilingual support (JP/TH): ollama pull mxbai-embed-large (change dimensions to 1024)
  model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
  # Must match the model's output size AND the vector(N) column in V15 migration.
  dimensions: ${OLLAMA_EMBED_DIMENSIONS:768}

forex:
  # Frankfurter open API — no key required.
  api-url: ${FOREX_API_URL:https://api.frankfurter.app/latest}
  # Applied on top of the mid-market rate before storing (0.5 = 0.5 %).
  markup-percent: ${FOREX_MARKUP_PERCENT:0.5}
  # Daily refresh at 00:01. Override via FOREX_CRON env var.
  cron: ${FOREX_CRON:0 1 0 * * *}

payment:
  sslcommerz:
    store-id: ${SSLCOMMERZ_STORE_ID:PLACEHOLDER}
    store-pass: ${SSLCOMMERZ_STORE_PASS:PLACEHOLDER}
    sandbox: ${SSLCOMMERZ_SANDBOX:true}
  paypay:
    api-key: ${PAYPAY_API_KEY:PLACEHOLDER}
    api-secret: ${PAYPAY_API_SECRET:PLACEHOLDER}
    sandbox: ${PAYPAY_SANDBOX:true}
  omise:
    public-key: ${OMISE_PUBLIC_KEY:PLACEHOLDER}
    secret-key: ${OMISE_SECRET_KEY:PLACEHOLDER}
  linepay:
    channel-id: ${LINEPAY_CHANNEL_ID:PLACEHOLDER}
    channel-secret: ${LINEPAY_CHANNEL_SECRET:PLACEHOLDER}
    sandbox: ${LINEPAY_SANDBOX:true}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: true

---
spring:
  config:
    activate:
      on-profile: test
  r2dbc:
    url: r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: false
